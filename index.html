<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Irregular Verbs Popcorn Sort</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="game-frame">
      <header>
        <h1>Irregular <span>Verbs</span></h1>
      </header>

      <section class="top-bar" aria-label="Game controls">
        <div id="score" class="score-pill">Score: 0 / 18</div>
        <div class="actions">
          <button id="checkBtn" class="action-btn">Check Answers</button>
          <button id="resetBtn" class="action-btn">Reset</button>
          <button id="shuffleBtn" class="action-btn">Shuffle Popcorn</button>
        </div>
      </section>

      <section id="popcornBank" class="popcorn-bank" aria-label="Verb popcorn pieces"></section>

      <section class="boxes" aria-label="Popcorn sorting boxes">
        <article class="box-wrap">
          <div class="box-label">Present / Base</div>
          <div class="popcorn-box" data-type="infinitive" aria-label="Present or base form popcorn box"></div>
        </article>

        <article class="box-wrap">
          <div class="box-label">Past Simple</div>
          <div class="popcorn-box" data-type="past" aria-label="Past simple popcorn box"></div>
        </article>

        <article class="box-wrap">
          <div class="box-label">Past Participle</div>
          <div class="popcorn-box" data-type="participle" aria-label="Past participle popcorn box"></div>
        </article>
      </section>

      <div id="feedback" class="feedback">Drag each popcorn verb into the correct box.</div>

      <section class="activity-divider" aria-label="Regular and irregular verb practice">
        <h2 class="activity-title">Regular or <span>Irregular?</span></h2>

        <section class="top-bar" aria-label="Regular and irregular controls">
          <div id="regularScore" class="score-pill">Score: 0 / 18</div>
          <div class="actions">
            <button id="regularCheckBtn" class="action-btn">Check Verbs</button>
            <button id="regularResetBtn" class="action-btn">Reset</button>
            <button id="regularShuffleBtn" class="action-btn">Shuffle</button>
          </div>
        </section>

        <div class="regular-layout">
          <section id="verbBank" class="verb-bank" aria-label="Regular and irregular verb cards"></section>

          <section class="regular-zones" aria-label="Regular and irregular sorting trays">
            <article class="sort-column">
              <div class="sort-label">Regular Verbs</div>
              <div class="sort-tray" data-kind="regular" aria-label="Regular verbs tray"></div>
            </article>

            <article class="sort-column">
              <div class="sort-label">Irregular Verbs</div>
              <div class="sort-tray" data-kind="irregular" aria-label="Irregular verbs tray"></div>
            </article>
          </section>
        </div>

        <div id="regularFeedback" class="feedback">Sort each verb into regular or irregular.</div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
